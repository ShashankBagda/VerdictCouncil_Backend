services:
  postgres:
    image: postgres:16-alpine
    container_name: vc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: verdictcouncil
      POSTGRES_USER: vc_dev
      POSTGRES_PASSWORD: vc_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vc_dev -d verdictcouncil"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  solace:
    image: solace/solace-pubsub-standard:latest
    container_name: vc-solace
    ports:
      - "55555:55555"   # SMF
      - "8080:8080"     # SEMP management
      - "1883:1883"     # MQTT
      - "5672:5672"     # AMQP
      - "9000:9000"     # REST
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: admin
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5550/health-check/guaranteed-active || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
