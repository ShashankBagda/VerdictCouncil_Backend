# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'Synthesis phase prompt — SynthesisOutput schema (single-case)'

providers:
  - id: openai:chat:gpt-4.1-mini
    config:
      temperature: 0
      max_tokens: 4096
      response_format:
        type: json_object

prompts:
  - file://prompt_builders/synthesis.js

defaultTest:
  options:
    transform: "output.replace(/^```(?:json)?\\n?|```$/g, '').trim()"
    # Pinned grader for llm-rubric stability across runs.
    provider: openai:chat:gpt-4.1-mini
  assert:
    # Budget gates — fail if a single test exceeds these.
    - type: cost
      threshold: 0.10
    - type: latency
      threshold: 90000  # synthesis is the heaviest phase — large prompt + rich output
    - type: llm-rubric
      threshold: 0.8
      value: |
        Examine `arguments.prosecution` and `arguments.defence` in the
                model output (or claimant/respondent equivalents).
                Pass criterion: the two sides must have COMPARABLE depth — measure
                by the total word count of each side's serialized JSON. The longer
                side must be no more than 2× the word count of the shorter side.
                Per the synthesis prompt's hard rule: "asymmetric depth is
                failure". Fail if one side is materially thinner than the other.
    # Prompt-declared shape (see prompts/synthesis.md), not the leaner
    # SynthesisOutput Pydantic schema. The two are in drift; production
    # reconciles via ToolStrategy at the agent factory.
    - type: is-json
      value:
        type: object
        required: [arguments, reasoning_chain]
        properties:
          arguments:
            type: object
          reasoning_chain:
            type: array
            minItems: 1

tests: file://test_loaders/synthesis.js
