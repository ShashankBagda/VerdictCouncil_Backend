# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'Synthesis phase prompt — SynthesisOutput schema (single-case)'

providers:
  - id: openai:chat:gpt-4.1-mini
    config:
      temperature: 0
      max_tokens: 4096
      response_format:
        type: json_object

prompts:
  - file://prompt_builders/synthesis.js

defaultTest:
  options:
    transform: "output.replace(/^```(?:json)?\\n?|```$/g, '').trim()"
  assert:
    # Prompt-declared shape (see prompts/synthesis.md), not the leaner
    # SynthesisOutput Pydantic schema. The two are in drift; production
    # reconciles via ToolStrategy at the agent factory.
    - type: is-json
      value:
        type: object
        required: [arguments, reasoning_chain]
        properties:
          arguments:
            type: object
          reasoning_chain:
            type: array
            minItems: 1

tests: file://test_loaders/synthesis.js
