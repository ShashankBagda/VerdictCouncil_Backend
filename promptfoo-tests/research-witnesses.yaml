# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'Research-witnesses phase prompt — WitnessesResearch schema (single-case)'

providers:
  - id: openai:chat:gpt-4.1-mini
    config:
      temperature: 0
      max_tokens: 4096
      response_format:
        type: json_object

prompts:
  - file://prompt_builders/research-witnesses.js

defaultTest:
  options:
    transform: "output.replace(/^```(?:json)?\\n?|```$/g, '').trim()"
    # Pinned grader for llm-rubric stability across runs.
    provider: openai:chat:gpt-4.1-mini
  assert:
    # Budget gates — fail if a single test exceeds these.
    - type: cost
      threshold: 0.10
    - type: latency
      threshold: 45000
    - type: llm-rubric
      threshold: 0.8
      value: |
        Examine the `witnesses` list in the model output.
                Pass criterion: every witness named must be either (a) a party in
                case_input.parties, or (b) someone explicitly named in or
                referenced by the raw documents (e.g. an enforcement officer
                mentioned in an enforcement summary, a calibration technician
                named in a certificate). No purely fabricated witnesses.
    - type: is-json
      value:
        type: object
        required: [witnesses]
        properties:
          witnesses:
            type: array

tests: file://test_loaders/research-witnesses.js
