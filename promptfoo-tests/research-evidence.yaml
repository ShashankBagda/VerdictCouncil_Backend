# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'Research-evidence phase prompt — EvidenceResearch schema (single-case)'

providers:
  - id: openai:chat:gpt-4.1-mini
    config:
      temperature: 0
      max_tokens: 4096
      response_format:
        type: json_object

prompts:
  - file://prompt_builders/research-evidence.js

defaultTest:
  options:
    transform: "output.replace(/^```(?:json)?\\n?|```$/g, '').trim()"
    # Pinned grader for llm-rubric stability across runs.
    provider: openai:chat:gpt-4.1-mini
  assert:
    # Budget gates — fail if a single test exceeds these.
    - type: cost
      threshold: 0.10
    - type: latency
      threshold: 45000
    - type: llm-rubric
      threshold: 0.8
      value: |
        Examine the `evidence_items` list in the model output.
                Pass criterion: every `evidence_items[i].description` must reference
                a specific document or witness named in the case_input (a real
                filename from raw_documents, a named party, or a specific
                allegation in the source text). No fabricated or generic items.
                Fail if any item is unattached to the source materials.
    - type: is-json
      value:
        type: object
        required: [evidence_items]
        properties:
          evidence_items:
            type: array

tests: file://test_loaders/research-evidence.js
