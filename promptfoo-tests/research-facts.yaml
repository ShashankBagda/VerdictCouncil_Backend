# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'Research-facts phase prompt — FactsResearch schema (single-case)'

providers:
  - id: openai:chat:gpt-4.1-mini
    config:
      temperature: 0
      max_tokens: 4096
      response_format:
        type: json_object

prompts:
  - file://prompt_builders/research-facts.js

defaultTest:
  options:
    transform: "output.replace(/^```(?:json)?\\n?|```$/g, '').trim()"
  assert:
    - type: is-json
      value:
        type: object
        required: [facts, timeline]
        properties:
          facts:
            type: array
          timeline:
            type: array

tests: file://test_loaders/research-facts.js
