# configs/services/layer2-aggregator.yaml
#
# Layer-2 fan-in aggregator. Waits for evidence-analysis, fact-reconstruction,
# and witness-analysis to complete per (case_id, run_id), then publishes the
# merged CaseState to the Layer-3 (legal-knowledge) request topic.
#
# The subscriptions below are aggregator-specific input topics: the mesh
# pipeline runner republishes each Layer-2 agent's response envelope
# (`{case_id, run_id, output, base_state}` JSON) to these topics so the
# aggregator can stay decoupled from SAM's A2A envelope format.
!include ../shared_config.yaml

apps:
  - name: layer2-aggregator
    app_module: src.services.layer2_aggregator.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: ${NAMESPACE}
      service_name: layer2-aggregator
      display_name: "Layer 2 Fan-In Aggregator"

      subscriptions:
        - topic: "verdictcouncil/aggregator/input/evidence-analysis"
          agent_key: "evidence_analysis"        # maps to CaseState.evidence_analysis
        - topic: "verdictcouncil/aggregator/input/fact-reconstruction"
          agent_key: "extracted_facts"          # maps to CaseState.extracted_facts
        - topic: "verdictcouncil/aggregator/input/witness-analysis"
          agent_key: "witnesses"                # maps to CaseState.witnesses

      output_topic: "verdictcouncil/a2a/v1/agent/request/legal-knowledge"

      redis_url: ${REDIS_URL}

      barrier:
        required_agents: ["evidence_analysis", "extracted_facts", "witnesses"]
        timeout_seconds: 120
        on_timeout: "halt_and_flag"
        # Redis key format: vc:aggregator:{case_id}:{run_id} (see aggregator.py)
