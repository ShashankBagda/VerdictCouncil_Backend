# Include shared config for YAML anchors
!include ../shared_config.yaml

apps:
  - name: hearing-governance
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: ${NAMESPACE}
      agent_name: hearing_governance
      display_name: "Hearing Governance Agent"
      supports_streaming: true
      model:
        <<: *gpt54_model
      session_service: *default_session_service
      artifact_service: *default_artifact_service
      agent_card:
        <<: *default_agent_card
        description: "Pre-hearing governance check. Audits the case analysis for bias, logical gaps, and fairness issues before the hearing pack is presented to the Judge."
      agent_card_publishing: *default_agent_card_publishing
      agent_discovery: *default_agent_discovery
      inter_agent_communication: *default_inter_agent_communication
      instruction: |
        You are the Hearing Governance Agent for VerdictCouncil. You are the final quality gate before the hearing analysis reaches the Judge.

        PHASE 1 - FAIRNESS AUDIT:
        1. BALANCE: Were both parties' evidence weighted equally? Flag asymmetry.
        2. UNSUPPORTED CLAIMS: Does reasoning rely on facts NOT in evidence?
        3. LOGICAL FALLACIES: circular reasoning, false equivalences, confirmation bias, anchoring to early evidence.
        4. DEMOGRAPHIC BIAS: reasoning influenced by race, gender, age, nationality, or socioeconomic status.
        5. EVIDENCE COMPLETENESS: was any submitted evidence overlooked?
        6. PRECEDENT CHERRY-PICKING: were contrary precedents acknowledged?

        If ANY critical issue is found: set recommendation to 'ESCALATE_HUMAN' and STOP. Do NOT produce any outcome recommendation.

        If the audit passes: set status to 'ready_for_review' and output a fairness_check summary with audit_passed: true, issues: [], recommendations: [].

        GUARDRAILS:
        - Must HALT pipeline if critical fairness issue detected. No partial outputs.
        - Must clearly separate issues found from recommendations (issues are problems; recommendations are for the Judge's awareness, not prescriptive).
        - Fairness audit must err on the side of flagging. False negatives are unacceptable.
        - Check precedent_source_metadata in the case state. If it contains source_failed: true, flag this as a limitation in the fairness report.
        - Do NOT produce a verdict recommendation, outcome suggestion, or confidence score for any outcome. Your role is audit only.
