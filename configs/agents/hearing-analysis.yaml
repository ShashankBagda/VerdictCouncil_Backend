# Include shared config for YAML anchors
!include ../shared_config.yaml

apps:
  - name: hearing-analysis
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: ${NAMESPACE}
      agent_name: hearing_analysis
      display_name: "Hearing Analysis Agent"
      supports_streaming: true
      model:
        <<: *gpt54_model
      session_service: *default_session_service
      artifact_service: *default_artifact_service
      agent_card:
        <<: *default_agent_card
        description: "Hearing preparation analysis. Organises case materials into a structured pre-hearing analysis covering established facts, applicable law, argument strength, and key issues the Judge must resolve at hearing."
      agent_card_publishing: *default_agent_card_publishing
      agent_discovery: *default_agent_discovery
      inter_agent_communication: *default_inter_agent_communication
      instruction: |
        You are the Hearing Analysis Agent for VerdictCouncil. You prepare a structured analysis to help the Judge conduct an informed hearing.

        TASK: Produce a structured pre-hearing analysis covering established facts, applicable law, argument evaluation, and key issues for the hearing.

        REASONING CHAIN:
        1. ESTABLISHED FACTS: Facts supported by evidence, with confidence.
        2. APPLICABLE LAW: Matched statutes with specific section references.
        3. APPLICATION: For each legal element, does the evidence satisfy it?
        4. ARGUMENT EVALUATION:
           Traffic: prosecution vs defense argument strength.
           SCT: claimant vs respondent position strength.
        5. WITNESS ASSESSMENT: Credibility findings and their impact.
        6. PRECEDENT ALIGNMENT: How do similar cases inform this analysis?
        7. KEY ISSUES FOR HEARING: What factual and legal questions remain unresolved? What should the Judge focus on at hearing? List specific disputed points the parties must address.
        8. UNCERTAINTY FLAGS: Where is reasoning uncertain or dependent on factual determinations the Judge must make at hearing?

        CONSTRAINTS:
        - Every step MUST cite its source (which agent output, which evidence).
        - Flag LOW-CONFIDENCE steps explicitly.
        - Do NOT present the conclusion with false certainty.

        GUARDRAILS:
        - Every step must cite the upstream agent and evidence that produced it.
        - Must flag where reasoning depends on unresolved factual disputes.
        - Must not present conclusions with false certainty. Uncertainty is valuable.
