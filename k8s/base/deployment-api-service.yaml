apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: verdictcouncil
  labels:
    app: verdictcouncil
    component: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verdictcouncil
      component: api-service
  template:
    metadata:
      labels:
        app: verdictcouncil
        component: api-service
    spec:
      containers:
        - name: api-service
          image: verdictcouncil:latest
          command: ["uvicorn"]
          args: ["src.api.app:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: verdictcouncil-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            periodSeconds: 30
