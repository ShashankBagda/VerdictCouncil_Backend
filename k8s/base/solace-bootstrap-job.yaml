# Bootstrap the `verdictcouncil` VPN + `vc-agent` client user after the
# Solace HA redundancy group comes active. Ships as a K8s Job so it runs
# once per cluster install (re-running is idempotent — SEMPv2 treats a
# POST to an existing object as a no-op update).
#
# The backend, all 9 SAM agents, and the Layer2 aggregator all connect
# as `vc-agent` on the `verdictcouncil` VPN (see k8s/base/secrets.yaml).
# Without this Job they all get AUTH_FAIL and the deploy comes up green
# but non-functional. This is the Phase 3 blocker the plan originally
# deferred to Phase 5.
---
apiVersion: v1
kind: Secret
metadata:
  name: solace-bootstrap-script
  namespace: verdictcouncil
type: Opaque
stringData:
  bootstrap.sh: |
    #!/bin/sh
    set -eu

    SEMP="http://${SOLACE_HOST}:8080/SEMP/v2/config"
    AUTH="admin:${ADMIN_PASSWORD}"
    VPN="${VPN_NAME}"
    USER="${CLIENT_USERNAME}"
    PWD="${CLIENT_PASSWORD}"

    echo "Waiting for SEMPv2 to respond on ${SOLACE_HOST}:8080 ..."
    for i in $(seq 1 60); do
      if curl -sfu "$AUTH" "${SEMP}/about/api" >/dev/null 2>&1; then
        echo "SEMPv2 up after ${i}s"
        break
      fi
      sleep 5
    done

    # Wait for the redundancy group to elect an active node. We hit the
    # Service (not a specific pod), so whichever broker holds the
    # `active="true"` label answers — if the group hasn't formed yet,
    # `activeStandbyRole` is empty and we keep waiting.
    echo "Waiting for redundancy group to elect an active node ..."
    for i in $(seq 1 60); do
      body=$(curl -sfu "$AUTH" "http://${SOLACE_HOST}:8080/SEMP/v2/monitor/redundancy" 2>/dev/null || true)
      if echo "$body" | grep -q '"activeStandbyRole"[[:space:]]*:[[:space:]]*"[^"]\+"'; then
        echo "Redundancy group active after ${i}s"
        break
      fi
      sleep 5
    done

    # --- Message VPN ------------------------------------------------------
    echo "Creating message VPN: ${VPN}"
    curl -sfu "$AUTH" -X POST -H 'Content-Type: application/json' \
      "${SEMP}/msgVpns" \
      -d "$(cat <<EOF
    {
      "msgVpnName": "${VPN}",
      "enabled": true,
      "authenticationBasicEnabled": true,
      "authenticationBasicType": "internal",
      "maxMsgSpoolUsage": 1500,
      "maxConnectionCount": 100
    }
    EOF
    )" || echo "VPN ${VPN} already exists (ok)"

    # --- ACL profile (defaults are permissive; tighten per audit later) ---
    echo "Creating ACL profile: vc-acl"
    curl -sfu "$AUTH" -X POST -H 'Content-Type: application/json' \
      "${SEMP}/msgVpns/${VPN}/aclProfiles" \
      -d '{
        "aclProfileName": "vc-acl",
        "clientConnectDefaultAction": "allow",
        "publishTopicDefaultAction": "allow",
        "subscribeTopicDefaultAction": "allow"
      }' || echo "ACL profile vc-acl already exists (ok)"

    # --- Client profile --------------------------------------------------
    echo "Creating client profile: vc-client"
    curl -sfu "$AUTH" -X POST -H 'Content-Type: application/json' \
      "${SEMP}/msgVpns/${VPN}/clientProfiles" \
      -d '{
        "clientProfileName": "vc-client",
        "allowGuaranteedEndpointCreateEnabled": true,
        "allowGuaranteedMsgSendEnabled": true,
        "allowGuaranteedMsgReceiveEnabled": true,
        "allowTransactedSessionsEnabled": true
      }' || echo "Client profile vc-client already exists (ok)"

    # --- Client username -------------------------------------------------
    echo "Creating client username: ${USER}"
    curl -sfu "$AUTH" -X POST -H 'Content-Type: application/json' \
      "${SEMP}/msgVpns/${VPN}/clientUsernames" \
      -d "$(cat <<EOF
    {
      "clientUsername": "${USER}",
      "password": "${PWD}",
      "enabled": true,
      "aclProfileName": "vc-acl",
      "clientProfileName": "vc-client"
    }
    EOF
    )" || echo "Client username ${USER} already exists — updating password"

    # Update password in case the user already existed from a prior install.
    curl -sfu "$AUTH" -X PATCH -H 'Content-Type: application/json' \
      "${SEMP}/msgVpns/${VPN}/clientUsernames/${USER}" \
      -d "$(cat <<EOF
    {
      "password": "${PWD}",
      "enabled": true,
      "aclProfileName": "vc-acl",
      "clientProfileName": "vc-client"
    }
    EOF
    )"

    echo "Bootstrap complete: VPN=${VPN} user=${USER}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: solace-bootstrap
  namespace: verdictcouncil
  labels:
    app: solace-bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 604800  # keep completed pods around for a week for audit
  template:
    metadata:
      labels:
        app: solace-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: SOLACE_HOST
              value: solace-broker
            - name: VPN_NAME
              valueFrom:
                secretKeyRef:
                  name: verdictcouncil-secrets
                  key: SOLACE_BROKER_VPN
            - name: CLIENT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: verdictcouncil-secrets
                  key: SOLACE_BROKER_USERNAME
            - name: CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verdictcouncil-secrets
                  key: SOLACE_BROKER_PASSWORD
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solace-broker-secrets
                  key: username_admin_password
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          secret:
            secretName: solace-bootstrap-script
            defaultMode: 0755
