apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-processing
  namespace: verdictcouncil
  labels:
    app: verdictcouncil
    component: case-processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verdictcouncil
      component: case-processing
  template:
    metadata:
      labels:
        app: verdictcouncil
        component: case-processing
    spec:
      containers:
        - name: case-processing
          image: verdictcouncil:latest
          args: ["--config", "/app/configs/agents/case-processing.yaml"]
          envFrom:
            - secretRef:
                name: verdictcouncil-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            periodSeconds: 30
