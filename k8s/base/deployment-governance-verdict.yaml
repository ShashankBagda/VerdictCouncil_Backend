apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-verdict
  namespace: verdictcouncil
  labels:
    app: verdictcouncil
    component: governance-verdict
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verdictcouncil
      component: governance-verdict
  template:
    metadata:
      labels:
        app: verdictcouncil
        component: governance-verdict
    spec:
      containers:
        - name: governance-verdict
          image: verdictcouncil:latest
          args: ["--config", "/app/configs/agents/governance-verdict.yaml"]
          envFrom:
            - secretRef:
                name: verdictcouncil-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            periodSeconds: 30
