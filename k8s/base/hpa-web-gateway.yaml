apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-gateway-hpa
  namespace: verdictcouncil
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
