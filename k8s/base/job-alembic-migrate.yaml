apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate
  # No `namespace:` — the deploy workflow passes `--namespace` per-env
  # (verdictcouncil for prod, verdictcouncil-staging for staging). A
  # hardcoded namespace here would conflict with that flag.
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: verdictcouncil:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: verdictcouncil-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
