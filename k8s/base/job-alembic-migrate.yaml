apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate
  namespace: verdictcouncil
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: verdictcouncil:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: verdictcouncil-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
