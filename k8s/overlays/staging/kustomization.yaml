apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: verdictcouncil-staging
resources:
  - ../../base
patches:
  - target:
      kind: Ingress
      name: verdictcouncil-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: 165.245.144.28.nip.io
      - op: replace
        path: /spec/tls/0/hosts/0
        value: 165.245.144.28.nip.io
