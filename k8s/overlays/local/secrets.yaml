# Local-only secrets for kind cluster. NOT for staging or production.
# Set OPENAI_API_KEY in your shell before applying:
#   export OPENAI_API_KEY=sk-...
#   envsubst < k8s/overlays/local/secrets.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: verdictcouncil-secrets
  namespace: verdictcouncil-local
type: Opaque
stringData:
  DATABASE_URL: "postgresql://vc:vc@postgres:5432/vc"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "local-dev-only-not-secure"
  COOKIE_SECURE: "false"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  FRONTEND_ORIGINS: "http://localhost:5173,http://localhost:3000"
  APP_ENV: "dev"
  LANGGRAPH_CHECKPOINTER: "disabled"
