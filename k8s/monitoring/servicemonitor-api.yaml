apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: verdictcouncil-api
  namespace: kube-prometheus-stack
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app: verdictcouncil
      component: api-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scheme: http
