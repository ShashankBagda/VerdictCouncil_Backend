name: CI

on:
  push:
    branches: [main, development, "release/**", "feat/**"]
  pull_request:
    branches: [development, main]

# Default least-privilege. Jobs that need more (eval comments on PRs)
# declare their own per-job permissions block.
permissions:
  contents: read

jobs:
  # Per-job path filter so the LangSmith eval (expensive — costs LangSmith
  # credits + ~5min) only runs when prompt/pipeline-touching files change.
  # Workflow-level path filters apply to the whole workflow; we want the
  # cheap jobs (lint, unit) to run on every PR regardless.
  changes:
    runs-on: ubuntu-latest
    outputs:
      eval: ${{ steps.filter.outputs.eval }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            eval:
              - 'src/pipeline/**'
              - 'src/agents/**'
              - 'tests/eval/**'
              - '**/prompts.py'
              - 'src/tools/**'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - run: pip install -e ".[dev]"
      # Standard unit tests (no infrastructure) + 100% coverage gate
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ tests/api/ -v --tb=short \
            --cov=src --cov-config=pyproject.toml \
            --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=100 \
            -m "not integration and not eval and not requires_openai"
        env:
          OPENAI_API_KEY: ""
          LANGGRAPH_CHECKPOINTER: disabled
          DATABASE_URL: "postgresql+asyncpg://unused:unused@localhost:5432/unused"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test-secret-for-ci"
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  property-tests:
    runs-on: ubuntu-latest
    needs: lint
    name: Property-based tests (Hypothesis)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - run: pip install -e ".[dev]"
      # Hypothesis property-based tests — run with reduced examples in CI
      - name: Run property-based tests
        run: |
          pytest tests/unit/test_property_based.py -v --tb=short \
            -m "not integration and not eval"
        env:
          HYPOTHESIS_PROFILE: ci
          OPENAI_API_KEY: ""
          LANGGRAPH_CHECKPOINTER: disabled
          DATABASE_URL: "postgresql+asyncpg://unused:unused@localhost:5432/unused"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test-secret-for-ci"

  sast:
    runs-on: ubuntu-latest
    needs: lint
    name: SAST (Static Application Security Testing)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit semgrep
      - run: pip install -e .

      # Bandit: Python security issue scanner
      - name: Bandit Security Scan
        run: bandit -r src/ -f sarif -o bandit-report.sarif || true
        continue-on-error: true

      # Semgrep: OWASP Top-10 + security-audit rules
      - name: Semgrep SAST
        run: |
          semgrep --config=p/security-audit --config=p/owasp-top-ten \
            --sarif -o semgrep-report.sarif src/ || true
        continue-on-error: true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-report.sarif
        continue-on-error: true

  sca:
    runs-on: ubuntu-latest
    needs: lint
    name: SCA (Software Composition Analysis)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit cyclonedx-bom
      - run: pip install -e .

      - name: pip-audit Vulnerability Check
        run: pip-audit --desc
        continue-on-error: true

      - name: Generate SBOM (CycloneDX)
        run: cyclonedx-bom -o sbom.xml
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.xml

  dast:
    runs-on: ubuntu-latest
    needs: sca
    name: DAST (Dynamic Application Security Testing)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verdict_user
          POSTGRES_PASSWORD: verdict_password
          POSTGRES_DB: verdict_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" requests

      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_password@localhost:5432/verdict_db
          JWT_SECRET: test-secret-key
          LANGGRAPH_CHECKPOINTER: disabled
          OPENAI_API_KEY: ""
          REDIS_URL: redis://localhost:6379
        run: |
          uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          sleep 8

      - name: Check Security Headers
        run: |
          python -c "
          import requests, json, sys
          r = requests.get('http://localhost:8000/health')
          print('Status:', r.status_code)
          print('Headers:', json.dumps(dict(r.headers), indent=2))
          "
        continue-on-error: true

      - name: API Contract Tests
        run: pytest tests/integration/test_api_contract.py -v --tb=short || true
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_password@localhost:5432/verdict_db
          JWT_SECRET: test-secret-key
          LANGGRAPH_CHECKPOINTER: disabled
          OPENAI_API_KEY: ""
        continue-on-error: true

  load-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    name: Load tests (Locust)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verdict_user
          POSTGRES_PASSWORD: verdict_password
          POSTGRES_DB: verdict_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"

      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_password@localhost:5432/verdict_db
          JWT_SECRET: test-secret-key
          LANGGRAPH_CHECKPOINTER: disabled
          OPENAI_API_KEY: ""
          REDIS_URL: redis://localhost:6379
        run: |
          uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          sleep 8

      # 30-second burst: 5 users, ramp 1/s — smoke-level load check
      # Failure: error rate > 5% OR p95 > threshold (enforced in locustfile quitting hook)
      - name: Run Locust load test (headless, 30s)
        run: |
          locust -f tests/load/locustfile.py \
            --headless -u 5 -r 1 -t 30s \
            --host http://localhost:8000 \
            --csv tests/load/results \
            --html tests/load/report.html \
            --exit-code-on-error 1
        env:
          VC_LOAD_USERNAME: judge@example.com
          VC_LOAD_PASSWORD: TestPassword123!
        continue-on-error: true  # Advisory — does not block merge

      - name: Upload load test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: tests/load/

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: verdictcouncil:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy: container image vulnerability scan (advisory)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: verdictcouncil:test
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
        continue-on-error: true

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif

  security-summary:
    runs-on: ubuntu-latest
    needs: [dast, unit-tests, property-tests, sast, build, load-tests]
    name: Security & Quality Summary
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit bandit
      - run: pip install -e .
      - run: pip-audit --desc
        continue-on-error: true
      - run: bandit -r src/ -ll
        continue-on-error: true

  # LangSmith golden-set eval gate (folded in from the former eval.yml).
  # Sprint 4 4.D3.1 — gates merges on >5% scorer regression vs the
  # baseline experiment captured in Sprint 3 3.D1.4.
  #
  # The gate is label-aware (4.D3.3): apply `eval/skip-regression` to
  # bypass the comparison without skipping the eval run itself — the
  # eval still runs (so reviewers see the numbers), it just doesn't
  # fail the check.
  #
  # PR-only and path-filtered: skipped on push events and when the
  # changeset doesn't touch pipeline / agents / tools / prompts / eval
  # tests. See the `changes` job above.
  eval:
    name: LangSmith Eval Gate
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.eval == 'true'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # eval comments delta on the PR
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EVAL_BASELINE_EXPERIMENT: ${{ vars.EVAL_BASELINE_EXPERIMENT }}
      EVAL_REGRESSION_THRESHOLD: "0.05"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Determine experiment name
        id: experiment
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "name=verdict-council-eval-${SHA:0:7}-stub" >> "$GITHUB_OUTPUT"

      - name: Run eval (stub mode)
        # Per-step budget: a hung LangSmith call shouldn't burn the whole
        # 10-min job timeout — leave room for the comparison + PR comment
        # steps to still run.
        timeout-minutes: 6
        run: |
          python tests/eval/run_eval.py \
            --mode stub \
            --experiment-prefix "verdict-council-eval"

      - name: Check label for skip-regression
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request?.labels || []).map(l => l.name);
            // Set an explicit '1'/'0' output so downstream `if:` clauses
            // compare against a literal string rather than the brittle
            // 'true'/'false' boolean stringification of `return`.
            core.setOutput('skip', labels.includes('eval/skip-regression') ? '1' : '0');

      - name: Compare to baseline
        if: steps.label_check.outputs.skip != '1'
        timeout-minutes: 2
        run: |
          if [ -z "${EVAL_BASELINE_EXPERIMENT:-}" ]; then
            echo "::warning::EVAL_BASELINE_EXPERIMENT repo variable is unset; gate is in observe-only mode."
            python tests/eval/compare_to_baseline.py \
              --experiment "${{ steps.experiment.outputs.name }}" \
              --baseline "missing" \
              --threshold "$EVAL_REGRESSION_THRESHOLD" \
              --allow-missing-baseline \
              --comment-path eval-delta.md
          else
            python tests/eval/compare_to_baseline.py \
              --experiment "${{ steps.experiment.outputs.name }}" \
              --baseline "$EVAL_BASELINE_EXPERIMENT" \
              --threshold "$EVAL_REGRESSION_THRESHOLD" \
              --comment-path eval-delta.md
          fi

      - name: Note skip
        if: steps.label_check.outputs.skip == '1'
        run: |
          echo "::notice::eval/skip-regression label present — comparison gate skipped (4.D3.3)."
          echo "## Eval Δ skipped" > eval-delta.md
          echo "" >> eval-delta.md
          echo "_The \`eval/skip-regression\` label was applied; the regression comparison did not run._" >> eval-delta.md

      - name: Comment delta on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('eval-delta.md')) return;
            const body = fs.readFileSync('eval-delta.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.startsWith('## Eval Δ'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
