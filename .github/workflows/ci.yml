name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [development, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=65
        env:
          OPENAI_API_KEY: ""

  openapi:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Regenerate OpenAPI snapshot
        run: python -m scripts.export_openapi docs/openapi.json
      - name: Verify docs/openapi.json is up to date
        run: |
          if ! git diff --exit-code docs/openapi.json; then
            echo "::error::docs/openapi.json is out of date — run 'make openapi-snapshot' locally and commit the diff"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit bandit
      - run: pip install -e .
      - run: pip-audit
        continue-on-error: true
      - run: bandit -r src/ -ll

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: verdictcouncil:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
