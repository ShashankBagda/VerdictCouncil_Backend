name: CI

# ── Trigger ──────────────────────────────────────────────────────────────────
# Single push trigger on long-lived branches only.
# Feature branches run CI through pull_request events — this prevents the
# "double-run" where both `push` and `pull_request` fire for the same commit.
# Deploy workflows (staging-deploy.yml, production-deploy.yml) use
# `workflow_run` to gate on CI success, so they never add a second trigger here.
on:
  push:
    branches: [main, development, "release/**", "feat/**"]
  pull_request:
    branches: [development, main]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  # ── 2a. Unit Tests (+ 100 % coverage) ─────────────────────────────────────
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=100 \
            -m "not integration and not eval"
        env:
          OPENAI_API_KEY: ""
          JWT_SECRET: "ci-test-secret"
          DATABASE_URL: ""
          REDIS_URL: ""
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml

  # ── 2b. SAST (Static Application Security Testing) ────────────────────────
  sast:
    name: SAST (Static Application Security Testing)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tools
        run: pip install bandit semgrep
      - name: Bandit — Python security scan
        run: bandit -r src/ -ll -ii -f json -o bandit-report.json
        continue-on-error: true
      - name: Semgrep — OWASP Top-10 + security-audit
        run: |
          semgrep --config=p/security-audit \
                  --config=p/owasp-top-ten \
                  --sarif -o semgrep.sarif \
                  src/ || true
        continue-on-error: true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── 2c. Build (Docker image verification) ─────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: verdictcouncil:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. SCA (Software Composition Analysis) ────────────────────────────────
  sca:
    name: SCA (Software Composition Analysis)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project + audit tools
        run: pip install -e . pip-audit cyclonedx-bom
      - name: pip-audit — CVE check
        run: pip-audit --desc --strict
        continue-on-error: true
      - name: Generate CycloneDX SBOM
        run: cyclonedx-bom -o sbom.xml
        continue-on-error: true
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.xml

  # ── 4. DAST (Dynamic Application Security Testing) ────────────────────────
  dast:
    name: DAST (Dynamic Application Security Testing)
    runs-on: ubuntu-latest
    needs: sca
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: verdict_user
          POSTGRES_PASSWORD: verdict_pass
          POSTGRES_DB: verdict_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" httpx
      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_pass@localhost:5432/verdict_db
        run: python -m alembic upgrade head
        continue-on-error: true
      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_pass@localhost:5432/verdict_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: dast-test-secret-key
          OPENAI_API_KEY: sk-dummy-key-for-dast
          COOKIE_SECURE: "false"
        run: |
          uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid
          # wait until /health is live
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/v1/health && break || sleep 2
          done
      - name: Security header audit
        run: |
          python - <<'EOF'
          import sys, requests, json
          r = requests.get("http://localhost:8000/api/v1/health")
          h = r.headers
          report = {
            "status_code": r.status_code,
            "x-content-type-options": h.get("x-content-type-options", "MISSING"),
            "x-frame-options": h.get("x-frame-options", "MISSING"),
            "cache-control": h.get("cache-control", "MISSING"),
          }
          print(json.dumps(report, indent=2))
          EOF
        continue-on-error: true
      - name: API contract integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_pass@localhost:5432/verdict_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: dast-test-secret-key
          OPENAI_API_KEY: ""
        run: |
          pytest tests/integration/ -v --tb=short \
            -m "not requires_openai" || true
        continue-on-error: true
      - name: Stop server
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

  # ── 5. Security Summary (gate job) ────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, sast, build, dast]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit bandit
      - run: pip install -e .
      - name: Re-run pip-audit (summary)
        run: pip-audit --desc
        continue-on-error: true
      - name: Re-run bandit (summary)
        run: bandit -r src/ -ll
        continue-on-error: true
      - name: Print CI result
        run: |
          echo "unit-tests : ${{ needs.unit-tests.result }}"
          echo "sast       : ${{ needs.sast.result }}"
          echo "build      : ${{ needs.build.result }}"
          echo "dast       : ${{ needs.dast.result }}"
