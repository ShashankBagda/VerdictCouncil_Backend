name: CI

on:
  push:
    # Only trigger on direct pushes to long-lived branches.
    # Feature branches with open PRs run via `pull_request` instead,
    # avoiding the double-CI issue where every push fires both events.
    branches: [main, development, "release/**"]
  pull_request:
    branches: [development, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=65
        env:
          OPENAI_API_KEY: ""

  sast:
    runs-on: ubuntu-latest
    needs: lint
    name: SAST (Static Application Security Testing)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit ruff semgrep pylint
      - run: pip install -e .
      
      # Bandit: Python security issue scanner
      - name: Bandit Security Scan
        run: bandit -r src/ -f json -o bandit-report.json || true
        continue-on-error: true
      
      # Semgrep: Static analysis for security patterns
      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep --config=p/security-audit --config=p/owasp-top-ten --json -o semgrep-report.json src/ || true
        continue-on-error: true
      
      # Generate SARIF report for GitHub Security tab
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep-report.json
        continue-on-error: true

  sca:
    runs-on: ubuntu-latest
    needs: lint
    name: SCA (Software Composition Analysis)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      # pip-audit: Dependency vulnerability scanner
      - name: pip-audit Vulnerability Check
        run: |
          pip install pip-audit
          pip install -e .
          pip-audit --desc
        continue-on-error: true
      
      # SBOM generation
      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-bom -o sbom.xml
        continue-on-error: true
      
      # Safety: Python dependency checker
      - name: Safety Dependency Check
        run: |
          pip install safety
          safety check --json > safety-report.json || true
        continue-on-error: true

  dast:
    runs-on: ubuntu-latest
    needs: sca
    name: DAST (Dynamic Application Security Testing)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verdict_user
          POSTGRES_PASSWORD: verdict_password
          POSTGRES_DB: verdict_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install requests
      
      - name: Start FastAPI server
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_password@localhost:5432/verdict_db
          JWT_SECRET: test-secret-key
        run: |
          uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      # Basic DAST: HTTP security headers check
      - name: Check Security Headers
        run: |
          python -c "
          import requests
          import json
          
          response = requests.get('http://localhost:8000/docs')
          headers = response.headers
          
          security_headers = {
              'x-content-type-options': headers.get('x-content-type-options'),
              'x-frame-options': headers.get('x-frame-options'),
              'strict-transport-security': headers.get('strict-transport-security'),
          }
          
          print(json.dumps(security_headers, indent=2))
          "
        continue-on-error: true
      
      # Basic API contract testing
      - name: API Contract Tests
        run: pytest tests/integration/test_api_contract.py -v || true
        env:
          DATABASE_URL: postgresql+asyncpg://verdict_user:verdict_password@localhost:5432/verdict_db
          JWT_SECRET: test-secret-key
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: verdictcouncil:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-summary:
    runs-on: ubuntu-latest
    needs: [dast, unit-tests, sast, build]
    name: Security Summary
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit bandit
      - run: pip install -e .
      - run: pip-audit --desc
        continue-on-error: true
      - run: bandit -r src/ -ll
        continue-on-error: true
