name: Deploy to Production

# Build the backend Docker image, push to DigitalOcean Container Registry
# under both a SemVer tag (from `git describe`) and the `latest` tag, then
# apply the production kustomize overlay, render runtime secrets, run
# Alembic migrations, and roll both Deployments (api-service and
# arq-worker — same image, different command).
#
# Required GitHub Action secrets:
#   DIGITALOCEAN_ACCESS_TOKEN        doctl access token (registry + DOKS)
#   DOCR_REGISTRY                    e.g. registry.digitalocean.com/<registry-name>
#   DOKS_PRODUCTION_CLUSTER_ID       UUID of the production DOKS cluster
#   OPENAI_API_KEY, OPENAI_VECTOR_STORE_ID
#   DATABASE_URL, REDIS_URL, JWT_SECRET
#   FRONTEND_ORIGINS
#   LANGSMITH_API_KEY (optional — tracing/eval only)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login

      - name: Build and push image
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          IMAGE=${{ secrets.DOCR_REGISTRY }}/verdictcouncil:${TAG}
          ROLLING=${{ secrets.DOCR_REGISTRY }}/verdictcouncil:latest
          docker build -t ${IMAGE} -t ${ROLLING} .
          docker push ${IMAGE}
          docker push ${ROLLING}
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      # Trivy: container image vulnerability scan (advisory — does not gate deploy)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-production
        continue-on-error: true

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-sarif-production
          path: trivy-image.sarif

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_PRODUCTION_CLUSTER_ID }}

      - name: Render secrets
        run: |
          kubectl create namespace verdictcouncil --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic verdictcouncil-secrets \
            --namespace verdictcouncil \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --from-literal=REDIS_URL=${{ secrets.REDIS_URL }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=OPENAI_VECTOR_STORE_ID=${{ secrets.OPENAI_VECTOR_STORE_ID }} \
            --from-literal=FRONTEND_ORIGINS=${{ secrets.FRONTEND_ORIGINS }} \
            --from-literal=LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
            --from-literal=COOKIE_SECURE=true \
            --from-literal=NAMESPACE=verdictcouncil \
            --from-literal=ENVIRONMENT=production \
            --from-literal=FASTAPI_HOST=0.0.0.0 \
            --from-literal=FASTAPI_PORT=8001 \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests with pinned image
        # Rewrite the placeholder `verdictcouncil:latest` everywhere it
        # appears in the rendered overlay (api-service + arq-worker
        # Deployments, stuck-case-watchdog CronJob) so all three pull
        # the freshly-built DOCR-qualified tag. This also removes the
        # need for separate `kubectl set image` calls.
        run: |
          kubectl kustomize k8s/overlays/production/ \
            | sed "s|image: verdictcouncil:latest|image: ${IMAGE}|g" \
            | kubectl apply -f -

      - name: Run database migrations
        run: |
          kubectl delete job alembic-migrate --namespace verdictcouncil --ignore-not-found
          sed "s|verdictcouncil:latest|${IMAGE}|g" k8s/base/job-alembic-migrate.yaml \
            | kubectl apply --namespace verdictcouncil -f -
          kubectl wait --for=condition=complete job/alembic-migrate \
            --namespace verdictcouncil --timeout=300s

      - name: Wait for rollouts
        run: |
          kubectl rollout status -n verdictcouncil deployment/api-service --timeout=300s
          kubectl rollout status -n verdictcouncil deployment/arq-worker  --timeout=300s
