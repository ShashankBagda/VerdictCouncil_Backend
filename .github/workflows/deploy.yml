name: Deploy

# CI/CD pipeline for the VerdictCouncil backend.
#
# Three sequential jobs so each stage is visible as its own node in the
# GitHub Actions graph:
#
#   build-and-push  →  trivy-scan  →  deploy
#       │                 │              │
#       │                 │              ├─ render runtime secrets
#       │                 │              ├─ apply kustomize overlay (api-service + arq-worker + cron)
#       │                 │              ├─ run Alembic migrations
#       │                 │              └─ wait for rollouts
#       │                 └─ Trivy SARIF (Security tab) + table summary
#       └─ multi-stage Docker build, push to DOCR
#
# Branch routing:
#   development → staging   (DOKS staging cluster, namespace verdictcouncil-staging)
#   main        → production (DOKS production cluster, namespace verdictcouncil)
#
# Image tags:
#   staging:    rc-<sha>      (rolling: staging-latest)
#   production: <git-describe> (rolling: latest)
#
# Required GitHub Action secrets:
#   DIGITALOCEAN_ACCESS_TOKEN, DOCR_REGISTRY
#   DOKS_STAGING_CLUSTER_ID, DOKS_PRODUCTION_CLUSTER_ID
#   OPENAI_API_KEY, OPENAI_VECTOR_STORE_ID, LANGSMITH_API_KEY (optional)
#   STAGING_DATABASE_URL,  DATABASE_URL
#   STAGING_REDIS_URL,     REDIS_URL
#   STAGING_JWT_SECRET,    JWT_SECRET
#   STAGING_FRONTEND_ORIGINS, FRONTEND_ORIGINS

on:
  push:
    branches: [development, main]
  workflow_dispatch:

permissions:
  contents: read
  # Required so the Trivy SARIF upload can post findings to the
  # repository Security tab (Code scanning alerts).
  security-events: write

jobs:
  # --------------------------------------------------------------------------
  # 1. Build the backend Docker image and push it to DOCR.
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      IS_PROD:     ${{ github.ref_name == 'main' }}
      ENV_NAME:    ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      ROLLING_TAG: ${{ github.ref_name == 'main' && 'latest' || 'staging-latest' }}
    outputs:
      image:    ${{ steps.image.outputs.image }}
      rolling:  ${{ steps.image.outputs.rolling }}
      env_name: ${{ env.ENV_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          # `git describe` on production needs full history.
          fetch-depth: 0

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login

      - name: Build Docker image
        id: image
        run: |
          if [ "$IS_PROD" = "true" ]; then
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          else
            TAG="rc-${{ github.sha }}"
          fi
          IMAGE="${{ secrets.DOCR_REGISTRY }}/verdictcouncil:${TAG}"
          ROLLING="${{ secrets.DOCR_REGISTRY }}/verdictcouncil:${ROLLING_TAG}"
          docker build -t "${IMAGE}" -t "${ROLLING}" .
          echo "image=${IMAGE}"     >> "$GITHUB_OUTPUT"
          echo "rolling=${ROLLING}" >> "$GITHUB_OUTPUT"

      - name: Push image to DOCR
        run: |
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ steps.image.outputs.rolling }}"

      - name: Summary
        run: |
          {
            echo "## Build & push"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ env.ENV_NAME }}\` |"
            echo "| Immutable tag | \`${{ steps.image.outputs.image }}\` |"
            echo "| Rolling tag   | \`${{ steps.image.outputs.rolling }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # 2. Scan the freshly-pushed image with Trivy.
  #    Uploads SARIF to the Security tab, archives the SARIF as an artifact,
  #    and renders a human-readable table into the run summary.
  # --------------------------------------------------------------------------
  trivy-scan:
    name: Trivy scan
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      ENV_NAME:       ${{ needs.build-and-push.outputs.env_name }}
      TRIVY_CATEGORY: ${{ github.ref_name == 'main' && 'trivy-image-production' || 'trivy-image-staging' }}
      TRIVY_ARTIFACT: ${{ github.ref_name == 'main' && 'trivy-image-sarif-production' || 'trivy-image-sarif-staging' }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login

      - name: Trivy scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image }}
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Trivy scan (table for run summary)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image }}
          format: table
          output: trivy-image.txt
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: ${{ env.TRIVY_CATEGORY }}

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.TRIVY_ARTIFACT }}
          path: trivy-image.sarif

      - name: Render Trivy table into run summary
        if: always()
        run: |
          {
            echo "## Trivy image scan"
            echo
            echo "Image: \`${{ needs.build-and-push.outputs.image }}\`"
            echo
            echo "Severity filter: HIGH, CRITICAL · Unfixed ignored · Scope: os,library"
            echo
            echo '```'
            if [ -s trivy-image.txt ]; then
              cat trivy-image.txt
            else
              echo "(no findings — image is clean)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # 3. Apply the kustomize overlay to DOKS, render runtime secrets, run
  #    Alembic migrations, and wait for the api-service + arq-worker
  #    Deployments to finish rolling.
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to DOKS
    needs: [build-and-push, trivy-scan]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      IS_PROD:          ${{ github.ref_name == 'main' }}
      ENV_NAME:         ${{ needs.build-and-push.outputs.env_name }}
      NAMESPACE:        ${{ github.ref_name == 'main' && 'verdictcouncil' || 'verdictcouncil-staging' }}
      OVERLAY:          ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      DOKS_CLUSTER_ID:  ${{ github.ref_name == 'main' && secrets.DOKS_PRODUCTION_CLUSTER_ID || secrets.DOKS_STAGING_CLUSTER_ID }}
      DATABASE_URL:     ${{ github.ref_name == 'main' && secrets.DATABASE_URL || secrets.STAGING_DATABASE_URL }}
      REDIS_URL:        ${{ github.ref_name == 'main' && secrets.REDIS_URL || secrets.STAGING_REDIS_URL }}
      JWT_SECRET:       ${{ github.ref_name == 'main' && secrets.JWT_SECRET || secrets.STAGING_JWT_SECRET }}
      FRONTEND_ORIGINS: ${{ github.ref_name == 'main' && secrets.FRONTEND_ORIGINS || secrets.STAGING_FRONTEND_ORIGINS }}
      IMAGE:            ${{ needs.build-and-push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl with cluster-admin credentials
        # See infra-bootstrap.yml for the rationale: both kubeconfig save
        # and /kubeconfig endpoints return exec-cred configs whose user
        # identity (the API token's email) lacks cluster-admin RBAC.
        # The /credentials endpoint returns an admin-scoped token mapped
        # to system:masters.
        run: |
          mkdir -p "$HOME/.kube"
          CREDS=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" \
            "https://api.digitalocean.com/v2/kubernetes/clusters/${DOKS_CLUSTER_ID}/credentials?expiry_seconds=0")
          SERVER=$(jq -r '.server' <<<"$CREDS")
          CA=$(jq -r '.certificate_authority_data' <<<"$CREDS")
          TOKEN=$(jq -r '.token' <<<"$CREDS")
          cat > "$HOME/.kube/config" <<EOF
          apiVersion: v1
          kind: Config
          clusters:
            - name: doks
              cluster:
                server: $SERVER
                certificate-authority-data: $CA
          users:
            - name: doks-admin
              user:
                token: $TOKEN
          contexts:
            - name: doks
              context:
                cluster: doks
                user: doks-admin
          current-context: doks
          EOF
          chmod 600 "$HOME/.kube/config"

      - name: Render runtime secrets
        run: |
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic verdictcouncil-secrets \
            --namespace "${NAMESPACE}" \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --from-literal=DATABASE_URL=${DATABASE_URL} \
            --from-literal=REDIS_URL=${REDIS_URL} \
            --from-literal=JWT_SECRET=${JWT_SECRET} \
            --from-literal=OPENAI_VECTOR_STORE_ID=${{ secrets.OPENAI_VECTOR_STORE_ID }} \
            --from-literal=FRONTEND_ORIGINS=${FRONTEND_ORIGINS} \
            --from-literal=LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
            --from-literal=COOKIE_SECURE=true \
            --from-literal=NAMESPACE="${NAMESPACE}" \
            --from-literal=ENVIRONMENT="${ENV_NAME}" \
            --from-literal=FASTAPI_HOST=0.0.0.0 \
            --from-literal=FASTAPI_PORT=8001 \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests with pinned image
        # Rewrite the placeholder `verdictcouncil:latest` everywhere it
        # appears in the rendered overlay (api-service + arq-worker
        # Deployments, stuck-case-watchdog CronJob) so all three pull
        # the freshly-built DOCR-qualified tag.
        run: |
          kubectl kustomize "k8s/overlays/${OVERLAY}/" \
            | sed "s|image: verdictcouncil:latest|image: ${IMAGE}|g" \
            | kubectl apply -f -

      - name: Run database migrations
        run: |
          kubectl delete job alembic-migrate --namespace "${NAMESPACE}" --ignore-not-found
          sed "s|verdictcouncil:latest|${IMAGE}|g" k8s/base/job-alembic-migrate.yaml \
            | kubectl apply --namespace "${NAMESPACE}" -f -
          kubectl wait --for=condition=complete job/alembic-migrate \
            --namespace "${NAMESPACE}" --timeout=300s

      - name: Wait for rollouts
        run: |
          kubectl rollout status -n "${NAMESPACE}" deployment/api-service --timeout=300s
          kubectl rollout status -n "${NAMESPACE}" deployment/arq-worker  --timeout=300s

      - name: Summary
        run: |
          {
            echo "## Deploy"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ env.ENV_NAME }}\` |"
            echo "| Cluster | \`${{ env.DOKS_CLUSTER_ID }}\` |"
            echo "| Namespace | \`${{ env.NAMESPACE }}\` |"
            echo "| Image | \`${{ env.IMAGE }}\` |"
            echo "| Overlay | \`k8s/overlays/${{ env.OVERLAY }}/\` |"
          } >> "$GITHUB_STEP_SUMMARY"
